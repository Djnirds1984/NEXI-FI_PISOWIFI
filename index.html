<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PisoWiFi - Internet Access Portal</title>
    <meta http-equiv="refresh" content="0; URL=pisowifi/">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            font-family: 'Arial', sans-serif; 
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .loading {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        a { 
            color: white; 
            text-decoration: none;
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }
        a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        @media (prefers-color-scheme: dark) {
            body { 
                background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 PisoWiFi Portal</h1>
        <p class="loading">Loading Internet Access Portal...</p>
        <p><a href="pisowifi/">Enter PisoWiFi Portal</a></p>
    </div>
</body>
</html>
