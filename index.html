<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PisoWiFi Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen" x-data="pisoWifi()">
        <!-- Sidebar Navigation -->
        <div class="w-64 bg-white shadow-lg">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-gray-800 mb-8">PisoWiFi</h1>
                <nav class="space-y-2">
                    <button @click="activeTab = 'status'" 
                            :class="activeTab === 'status' ? 'bg-blue-500 text-white' : 'text-gray-700 hover:bg-gray-100'"
                            class="w-full text-left px-4 py-3 rounded-lg font-medium transition-colors">
                        📊 Status
                    </button>
                    <button @click="activeTab = 'wifi'" 
                            :class="activeTab === 'wifi' ? 'bg-blue-500 text-white' : 'text-gray-700 hover:bg-gray-100'"
                            class="w-full text-left px-4 py-3 rounded-lg font-medium transition-colors">
                        📶 WiFi
                    </button>
                    <button @click="activeTab = 'license'" 
                            :class="activeTab === 'license' ? 'bg-blue-500 text-white' : 'text-gray-700 hover:bg-gray-100'"
                            class="w-full text-left px-4 py-3 rounded-lg font-medium transition-colors">
                        🔑 License
                    </button>
                    <button @click="activeTab = 'sales'" 
                            :class="activeTab === 'sales' ? 'bg-blue-500 text-white' : 'text-gray-700 hover:bg-gray-100'"
                            class="w-full text-left px-4 py-3 rounded-lg font-medium transition-colors">
                        💰 Sales
                    </button>
                    <button @click="activeTab = 'settings'" 
                            :class="activeTab === 'settings' ? 'bg-blue-500 text-white' : 'text-gray-700 hover:bg-gray-100'"
                            class="w-full text-left px-4 py-3 rounded-lg font-medium transition-colors">
                        ⚙️ Settings
                    </button>
                </nav>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 overflow-auto">
            <div class="container mx-auto px-8 py-8">
                <h2 class="text-3xl font-bold text-gray-800 mb-8" x-text="getPageTitle()"></h2>

            <!-- Main Content -->
            <div class="bg-white rounded-lg shadow-lg p-8">
                <!-- Status Tab -->
                <div x-show="activeTab === 'status'" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                            <h3 class="font-semibold text-gray-800 mb-3">📡 Router Info</h3>
                            <p class="text-sm text-gray-600 mb-2" x-text="status.hostname ? '🖥️ Hostname: ' + status.hostname : '🔄 Loading...'"></p>
                            <p class="text-sm text-gray-600" x-text="status.uptime ? '⏱️ Uptime: ' + status.uptime : '🔄 Loading...'"></p>
                        </div>
                        <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                            <h3 class="font-semibold text-gray-800 mb-3">🌐 Network Status</h3>
                            <p class="text-sm text-gray-600 mb-2" x-text="status.wan_ip ? '🌍 WAN IP: ' + status.wan_ip : '🔄 Loading...'"></p>
                            <p class="text-sm text-gray-600" x-text="status.lan_ip ? '🏠 LAN IP: ' + status.lan_ip : '🔄 Loading...'"></p>
                        </div>
                    </div>
                    <button @click="loadStatus()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                        🔄 Refresh Status
                    </button>
                </div>

                <!-- WiFi Tab -->
                <div x-show="activeTab === 'wifi'" class="space-y-6">
                    <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                        <h3 class="font-semibold text-gray-800 mb-4">📶 WiFi Configuration</h3>
                        <form @submit.prevent="saveWifi()" class="space-y-4">
                            <div>
                                <label for="ssid" class="block text-sm font-medium text-gray-700 mb-2">📝 SSID (Network Name)</label>
                                <input type="text" id="ssid" x-model="wifi.ssid" 
                                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 px-3 py-2">
                            </div>
                            <div>
                                <label for="key" class="block text-sm font-medium text-gray-700 mb-2">🔑 WiFi Key (Password)</label>
                                <input type="password" id="key" x-model="wifi.key" 
                                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 px-3 py-2">
                            </div>
                            <div class="flex space-x-4 pt-4">
                                <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                                    💾 Save WiFi Settings
                                </button>
                                <button type="button" @click="loadWifi()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                                    🔄 Refresh
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- License Tab -->
                <div x-show="activeTab === 'license'" class="space-y-6">
                    <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                        <h3 class="font-semibold text-gray-800 mb-4">🔑 License Configuration</h3>
                        <form @submit.prevent="saveLicense()" class="space-y-4">
                            <div>
                                <label for="centralized_key" class="block text-sm font-medium text-gray-700 mb-2">🔐 Centralized Key</label>
                                <input type="password" id="centralized_key" x-model="license.centralized_key" 
                                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 px-3 py-2">
                            </div>
                            <div class="flex space-x-4 pt-4">
                                <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                                    💾 Save License Key
                                </button>
                                <button type="button" @click="loadLicense()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                                    🔄 Refresh
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Sales Tab -->
                <div x-show="activeTab === 'sales'" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-gradient-to-br from-green-50 to-green-100 p-6 rounded-lg border border-green-200">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h3 class="font-semibold text-gray-800 mb-2">💰 Today's Sales</h3>
                                    <p class="text-3xl font-bold text-green-600" x-text="sales.today_sales ? '₱' + sales.today_sales : '🔄 Loading...'"></p>
                                </div>
                                <div class="text-4xl text-green-400">💸</div>
                            </div>
                        </div>
                        <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-6 rounded-lg border border-blue-200">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h3 class="font-semibold text-gray-800 mb-2">👥 Total Sessions</h3>
                                    <p class="text-3xl font-bold text-blue-600" x-text="sales.total_sessions ? sales.total_sessions : '🔄 Loading...'"></p>
                                </div>
                                <div class="text-4xl text-blue-400">📊</div>
                            </div>
                        </div>
                    </div>
                    <button @click="loadSales()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                        🔄 Refresh Sales Data
                    </button>
                </div>

                <!-- Settings Tab -->
                <div x-show="activeTab === 'settings'" class="space-y-6">
                    <div class="bg-white rounded-lg border border-gray-200">
                        <div class="border-b border-gray-200">
                            <nav class="flex space-x-8 px-6" aria-label="Settings Tabs">
                                <button @click="settingsTab = 'admin_password'" 
                                        :class="settingsTab === 'admin_password' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                                        class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                                    Change Admin Password
                                </button>
                            </nav>
                        </div>
                        <div class="p-6">
                            <!-- Change Admin Password Sub-page -->
                            <div x-show="settingsTab === 'admin_password'" class="space-y-6">
                                <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                                    <h3 class="font-semibold text-gray-800 mb-4">🔐 Change Admin Password</h3>
                                    <form @submit.prevent="changeAdminPassword()" class="space-y-4">
                                        <div>
                                            <label for="current_password" class="block text-sm font-medium text-gray-700 mb-2">🔑 Current Password</label>
                                            <input type="password" id="current_password" x-model="adminPassword.current" 
                                                   class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 px-3 py-2">
                                        </div>
                                        <div>
                                            <label for="new_password" class="block text-sm font-medium text-gray-700 mb-2">🆕 New Password</label>
                                            <input type="password" id="new_password" x-model="adminPassword.new" 
                                                   class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 px-3 py-2">
                                        </div>
                                        <div>
                                            <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">✅ Confirm New Password</label>
                                            <input type="password" id="confirm_password" x-model="adminPassword.confirm" 
                                                   class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 px-3 py-2">
                                        </div>
                                        <div class="flex space-x-4 pt-4">
                                            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                                                💾 Change Password
                                            </button>
                                            <button type="button" @click="clearPasswordFields()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                                                🔄 Clear
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alert Messages -->
        <div x-show="message.text" 
             :class="message.type === 'success' ? 'bg-green-100 border-green-400 text-green-700' : 'bg-red-100 border-red-400 text-red-700'"
             class="fixed top-4 right-4 border px-4 py-3 rounded z-50">
            <span x-text="message.text"></span>
            <button @click="message.text = ''" class="ml-2 font-bold">×</button>
        </div>
    </div>

    <script>
        function pisoWifi() {
            return {
                activeTab: 'status',
                settingsTab: 'admin_password',
                status: {},
                wifi: {
                    ssid: '',
                    key: ''
                },
                license: {
                    centralized_key: ''
                },
                sales: {
                    today_sales: 0,
                    total_sessions: 0
                },
                adminPassword: {
                    current: '',
                    new: '',
                    confirm: ''
                },
                message: {
                    text: '',
                    type: ''
                },

                init() {
                    this.loadStatus();
                    this.loadWifi();
                    this.loadLicense();
                    this.loadSales();
                },

                async apiCall(action, data = null) {
                    try {
                        const options = {
                            method: data ? 'POST' : 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                            }
                        };
                        if (data) {
                            options.body = JSON.stringify(data);
                        }
                        
                        const response = await fetch(`/cgi-bin/api?action=${action}`, options);
                        const result = await response.json();
                        
                        if (result.success) {
                            this.showMessage(result.message || 'Operation successful', 'success');
                            return result.data;
                        } else {
                            this.showMessage(result.message || 'Operation failed', 'error');
                            return null;
                        }
                    } catch (error) {
                        this.showMessage('API call failed: ' + error.message, 'error');
                        return null;
                    }
                },

                async loadStatus() {
                    const data = await this.apiCall('get_status');
                    if (data) {
                        this.status = data;
                    }
                },

                async loadWifi() {
                    const data = await this.apiCall('get_wifi');
                    if (data) {
                        this.wifi = data;
                    }
                },

                async saveWifi() {
                    const result = await this.apiCall('set_wifi', this.wifi);
                    if (result) {
                        this.loadWifi();
                    }
                },

                async loadLicense() {
                    const data = await this.apiCall('get_license');
                    if (data) {
                        this.license = data;
                    }
                },

                async saveLicense() {
                    const result = await this.apiCall('set_license', this.license);
                    if (result) {
                        this.loadLicense();
                    }
                },

                async loadSales() {
                    const data = await this.apiCall('get_sales');
                    if (data) {
                        this.sales = data;
                    }
                },

                getPageTitle() {
                    const titles = {
                        'status': 'System Status',
                        'wifi': 'WiFi Settings',
                        'license': 'License Management',
                        'sales': 'Sales Management',
                        'settings': 'Settings'
                    };
                    return titles[this.activeTab] || 'PisoWiFi Management';
                },

                showMessage(text, type) {
                    this.message = { text, type };
                    setTimeout(() => {
                        this.message.text = '';
                    }, 3000);
                },

                async changeAdminPassword() {
                    if (!this.adminPassword.current || !this.adminPassword.new || !this.adminPassword.confirm) {
                        this.showMessage('Please fill in all password fields', 'error');
                        return;
                    }
                    
                    if (this.adminPassword.new !== this.adminPassword.confirm) {
                        this.showMessage('New password and confirmation do not match', 'error');
                        return;
                    }
                    
                    if (this.adminPassword.new.length < 6) {
                        this.showMessage('New password must be at least 6 characters long', 'error');
                        return;
                    }
                    
                    const result = await this.apiCall('change_admin_password', {
                        current_password: this.adminPassword.current,
                        new_password: this.adminPassword.new
                    });
                    
                    if (result) {
                        this.clearPasswordFields();
                    }
                },

                clearPasswordFields() {
                    this.adminPassword.current = '';
                    this.adminPassword.new = '';
                    this.adminPassword.confirm = '';
                }
            }
        }
    </script>
</body>
</html>
